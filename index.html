<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Privacy guarantee, enforced structurally: connect-src omits everything
       except model-weight hosts, so camera frames cannot be transmitted
       anywhere. Loosen only with a matching update to the Safety Agent doc. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com 'wasm-unsafe-eval'; style-src 'self' https://unpkg.com 'unsafe-inline'; img-src 'self' data: blob: https://unpkg.com https://*.basemaps.cartocdn.com; connect-src 'self' https://tfhub.dev https://storage.googleapis.com https://www.kaggle.com; worker-src 'self' blob:; media-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <title>Desk View GIS — Gesture Map Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="state-splash">
  <!-- Monochrome line-icon sprite (no external icon font; keeps CSP tight) -->
  <svg width="0" height="0" class="icon-defs" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-crosshair" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" /><line x1="12" y1="2" x2="12" y2="6" />
        <line x1="12" y1="18" x2="12" y2="22" /><line x1="2" y1="12" x2="6" y2="12" />
        <line x1="18" y1="12" x2="22" y2="12" />
      </symbol>
      <symbol id="i-window" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="14" rx="2" /><line x1="3" y1="8" x2="21" y2="8" />
        <line x1="9" y1="21" x2="15" y2="21" /><line x1="12" y1="18" x2="12" y2="21" />
      </symbol>
      <symbol id="i-camera" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
        <circle cx="12" cy="13" r="4" />
      </symbol>
      <symbol id="i-video" viewBox="0 0 24 24">
        <rect x="1" y="5" width="15" height="14" rx="2" /><path d="M23 7l-7 5 7 5V7z" />
      </symbol>
      <symbol id="i-map" viewBox="0 0 24 24">
        <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z" /><line x1="8" y1="2" x2="8" y2="18" />
        <line x1="16" y1="6" x2="16" y2="22" />
      </symbol>
      <symbol id="i-pin" viewBox="0 0 24 24">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
      </symbol>
      <symbol id="i-flip" viewBox="0 0 24 24">
        <line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="2 3" />
        <path d="M8 8l-4 4 4 4" /><path d="M16 8l4 4-4 4" />
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6" />
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
      </symbol>
      <symbol id="i-refresh" viewBox="0 0 24 24">
        <path d="M23 4v6h-6" /><path d="M20.5 15a9 9 0 1 1-2.1-9.4L23 10" />
      </symbol>
      <symbol id="i-lock" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </symbol>
      <symbol id="i-arrow-right" viewBox="0 0 24 24">
        <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" />
      </symbol>
    </defs>
  </svg>

  <!-- The map is always present; during the splash it shows through the
       frosted overlay as a blurred preview of what comes next. -->
  <div id="map"></div>

  <!-- Splash / source picker overlay -->
  <div id="start-screen">
    <div class="start-card">
      <div class="brand">
        <svg class="brand-mark"><use href="#i-crosshair" /></svg>
        <h1>Desk&nbsp;View <span>GIS</span></h1>
      </div>
      <p class="tagline">Control the map with your hands, seen from above.</p>

      <div class="source-buttons">
        <button id="btn-capture-window" class="btn btn-primary">
          <svg class="ic"><use href="#i-window" /></svg>
          <span class="btn-text">Capture Desk&nbsp;View window
            <small>Pick the Desk View window — no OBS needed</small></span>
        </button>
        <button id="btn-use-camera" class="btn btn-outline">
          <svg class="ic"><use href="#i-camera" /></svg>
          <span class="btn-text">Use a camera
            <small>Webcam, or OBS Virtual Camera streaming Desk View</small></span>
        </button>
      </div>

      <div id="camera-picker" class="hidden">
        <label for="camera-select">Camera</label>
        <select id="camera-select"></select>
      </div>

      <div id="start-status" class="start-status"></div>

      <p class="privacy-note">
        <svg class="ic-sm"><use href="#i-lock" /></svg>
        Video is processed on your device — it never leaves.
      </p>

      <div class="gesture-legend">
        <div><span class="g-key">Pinch + drag</span><span>pan the map</span></div>
        <div><span class="g-key">Pinch both hands</span><span>zoom in / out</span></div>
        <div><span class="g-key">Point + hold</span><span>drop a marker</span></div>
      </div>

      <button id="btn-skip" class="skip-link">
        Skip to map — troubleshoot without a camera
        <svg class="ic-sm"><use href="#i-arrow-right" /></svg>
      </button>
    </div>
  </div>

  <!-- App chrome, drawn over the map; fades in after a source is chosen -->
  <div id="app-chrome">
    <canvas id="ghost-canvas"></canvas>

    <div id="camera-view" class="hidden">
      <video id="video-main" autoplay playsinline muted></video>
      <canvas id="overlay-main"></canvas>
    </div>

    <div id="pip">
      <video id="video-pip" autoplay playsinline muted></video>
      <canvas id="overlay-pip"></canvas>
    </div>

    <div id="hud">
      <svg class="hud-ic"><use href="#i-crosshair" /></svg>
      <span id="hud-gesture">Show your hands to the camera</span>
    </div>

    <div id="toolbar">
      <button id="btn-mode" class="tool" title="Toggle full camera view">
        <svg class="ic"><use href="#i-video" /></svg><span class="tool-label">Camera</span>
      </button>
      <button id="btn-mirror" class="tool" title="Flip the video horizontally">
        <svg class="ic"><use href="#i-flip" /></svg><span class="tool-label">Mirror</span>
      </button>
      <button id="btn-clear-markers" class="tool" title="Remove all dropped markers">
        <svg class="ic"><use href="#i-trash" /></svg><span class="tool-label">Clear</span>
      </button>
      <button id="btn-change-source" class="tool" title="Pick a different video source">
        <svg class="ic"><use href="#i-refresh" /></svg><span class="tool-label">Source</span>
      </button>
    </div>
  </div>

  <!-- Hidden element the hand-pose model reads from -->
  <video id="video-source" autoplay playsinline muted></video>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/ml5@1.3.1/dist/ml5.min.js"
          integrity="sha384-NgzCgVhddHQwesiM5Dq8em6DAvdTY+QeVyoFKp5puZW69cfMYRBCep1t37Ibt8S0" crossorigin="anonymous"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
